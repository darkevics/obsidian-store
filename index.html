<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* Smooth Scrolling Enable */
        html {
            scroll-behavior: smooth;
        }

        /* Base Reset & Theme */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            padding-bottom: 100px;
        }

        /* Top Navigation Bar */
        .navbar {
            background-color: #000000;
            padding: 18px 40px;
            text-align: left;
            border-bottom: 2px solid #141414;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            margin-right: 15px;
            transition: color 0.2s;
        }
        .navbar a:hover {
            color: #a855f7;
        }
        .navbar span {
            color: #333333;
            margin-right: 15px;
            font-weight: 800;
        }

        /* Container for content */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header Area */
        .header-title {
            font-size: 2.8rem;
            font-weight: 900;
            margin: 60px 0 25px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            letter-spacing: 0.5px;
        }
        
        /* Obsidian block emojis as placeholders for the icons */
        .header-title::before, .header-title::after {
            content: "⬛"; 
            font-size: 1.8rem;
            filter: drop-shadow(0 0 4px rgba(168, 85, 247, 0.4));
        }

        /* Server IP Widget Box */
        .ip-bar {
            background-color: #111111;
            border: 1px solid #222222;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            gap: 15px;
            font-size: 0.85rem;
            margin-bottom: 80px;
            letter-spacing: 0.5px;
        }
        .ip-bar .mc-label {
            color: #ffffff;
            font-weight: 800;
        }
        .ip-bar .divider {
            color: #333333;
        }
        .ip-bar .ip-address {
            color: #a855f7; 
            font-weight: 600;
        }
        .ip-bar .copy-btn {
            background-color: #581c87; 
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 800;
            font-size: 0.8rem;
            transition: background-color 0.2s;
        }
        .ip-bar .copy-btn:hover {
            background-color: #6b21a8;
        }
